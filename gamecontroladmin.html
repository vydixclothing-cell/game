<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Game - Admin Control</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        .admin-container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-dark); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-card { background-color: var(--card-bg); padding: 40px; border-radius: 15px; border: 1px solid var(--border-color); width: 100%; max-width: 400px; text-align: center; }
        .login-card h2 { color: var(--primary-color); margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--text-secondary); }
        .input-group input, .input-group select { width: 100%; padding: 12px; background-color: var(--sidebar-bg); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); outline: none; }
        .login-btn { width: 100%; padding: 12px; background-color: var(--primary-color); border: none; border-radius: 8px; color: #000; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .admin-card { background-color: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--border-color); margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .add-btn { background-color: #28a745; color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: opacity 0.3s; }
        .add-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .admin-game-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid var(--border-color); }
        .game-meta { display: flex; align-items: center; gap: 15px; }
        .game-meta img { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
        .remove-btn { background-color: #dc3545; color: white; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; transition: opacity 0.3s; }
        .remove-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .hidden { display: none !important; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; color: white; }
    </style>
</head>
<body class="dark-theme">
    <div id="loading-overlay" class="hidden">
        <i class="fas fa-spinner fa-spin fa-3x"></i>
        <p style="margin-top: 15px;">Updating GitHub...</p>
    </div>

    <div id="login-screen">
        <div class="login-card">
            <div class="logo" style="justify-content: center; margin-bottom: 20px;">
                <i class="fas fa-dice-d20"></i>
                <span>LUCKY <strong>GAME ADMIN</strong></span>
            </div>
            <h2>Admin Login</h2>
            <div class="input-group"><label>GitHub Username</label><input type="text" id="gh-username" placeholder="vydixclothing-cell"></div>
            <div class="input-group"><label>Repository Name</label><input type="text" id="gh-repo" placeholder="game"></div>
            <div class="input-group"><label>Personal Access Token</label><input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx"></div>
            <button class="login-btn" id="login-btn">LOGIN & CONNECT</button>
            <p id="login-error" style="color: #dc3545; margin-top: 15px;" class="hidden">Check details or Token permissions!</p>
            <p style="font-size: 12px; color: var(--text-secondary); margin-top: 15px;">Your Token is saved locally in your browser only.</p>
        </div>
    </div>

    <div id="admin-dashboard" class="admin-container hidden">
        <header class="admin-header">
            <div class="logo"><i class="fas fa-dice-d20"></i><span>LUCKY <strong>CONTROL</strong></span></div>
            <button id="logout-btn" class="remove-btn">LOGOUT</button>
        </header>

        <div class="admin-card">
            <h3><i class="fas fa-plus-circle"></i> Add New Game</h3>
            <div class="form-grid">
                <div class="input-group"><label>Game Name</label><input type="text" id="game-name" placeholder="E.g. My New Game"></div>
                <div class="input-group"><label>Category</label>
                    <select id="game-category">
                        <option value="Action">Action</option><option value="Racing">Racing</option>
                        <option value="Puzzle">Puzzle</option><option value="Adventure">Adventure</option>
                        <option value="Sports">Sports</option><option value="Arcade">Arcade</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Game Image (Upload)</label>
                    <input type="file" id="game-image-file" accept="image/*">
                </div>
                <div class="input-group">
                    <label>Game Folder (Upload All Files)</label>
                    <input type="file" id="game-folder-files" webkitdirectory directory multiple>
                    <small style="color: var(--text-secondary); display: block; margin-top: 5px;">Select the folder containing index.html</small>
                </div>
            </div>
            <button class="add-btn" id="add-game-btn">UPLOAD & ADD GAME PERMANENTLY</button>
            <div id="upload-status" style="margin-top: 15px; font-size: 14px; color: var(--primary-color);" class="hidden"></div>
        </div>

        <div class="admin-card">
            <h3><i class="fas fa-list"></i> Live Games (<span id="total-games-count">0</span>)</h3>
            <div id="admin-game-list"></div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        let GITHUB_CONFIG = {
            token: localStorage.getItem('gh_token') || '',
            username: localStorage.getItem('gh_user') || 'vydixclothing-cell',
            repo: localStorage.getItem('gh_repo') || 'game',
            path: 'games.js'
        };

        const loginScreen = document.getElementById('login-screen');
        const dashboard = document.getElementById('admin-dashboard');
        const gameList = document.getElementById('admin-game-list');
        const countSpan = document.getElementById('total-games-count');
        const loadingOverlay = document.getElementById('loading-overlay');
        const statusDiv = document.getElementById('upload-status');

        // Pre-fill inputs from localStorage
        document.getElementById('gh-username').value = GITHUB_CONFIG.username;
        document.getElementById('gh-repo').value = GITHUB_CONFIG.repo;
        document.getElementById('gh-token').value = GITHUB_CONFIG.token;

        let currentGames = [];
        let fileSha = '';

        // Utility to convert file to base64
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
                reader.readAsDataURL(file);
            });
        }

        // Utility to upload a single file to GitHub
        async function uploadFileToGitHub(path, base64Content, message) {
            const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/contents/${path}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${GITHUB_CONFIG.token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: message,
                    content: base64Content
                })
            });
            return response.ok;
        }

        // Login Logic
        document.getElementById('login-btn').addEventListener('click', async () => {
            const user = document.getElementById('gh-username').value.trim();
            const repo = document.getElementById('gh-repo').value.trim();
            const token = document.getElementById('gh-token').value.trim();

            if (!user || !repo || !token) {
                alert('Please fill all login fields!');
                return;
            }

            // Update local config
            GITHUB_CONFIG.username = user;
            GITHUB_CONFIG.repo = repo;
            GITHUB_CONFIG.token = token;

            // Test connection by fetching games
            const success = await fetchGamesFromGitHub(true);
            if (success) {
                // Save for next time in this browser
                localStorage.setItem('gh_user', user);
                localStorage.setItem('gh_repo', repo);
                localStorage.setItem('gh_token', token);
                sessionStorage.setItem('admin_logged_in', 'true');
                showDashboard();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        });

        function showDashboard() {
            loginScreen.classList.add('hidden');
            dashboard.classList.remove('hidden');
            fetchGamesFromGitHub();
        }

        if (sessionStorage.getItem('admin_logged_in') === 'true' && GITHUB_CONFIG.token) {
            showDashboard();
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            sessionStorage.removeItem('admin_logged_in');
            window.location.reload();
        });

        // Fetch Games from GitHub API
        async function fetchGamesFromGitHub(isTest = false) {
            if (!isTest) loadingOverlay.classList.remove('hidden');
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`, {
                    headers: { 'Authorization': `token ${GITHUB_CONFIG.token}` }
                });
                
                if (!response.ok) throw new Error('Auth failed');
                
                const data = await response.json();
                fileSha = data.sha;
                
                // Decode Base64 content
                const content = atob(data.content);
                
                // Extract array from JS file using regex
                const arrayMatch = content.match(/const games = (\[[\s\S]*?\]);/);
                if (arrayMatch) {
                    const arrayStr = arrayMatch[1].replace(/(\w+):/g, '"$1":').replace(/'/g, '"').replace(/,(\s*\])/, '$1');
                    try {
                        currentGames = JSON.parse(arrayStr);
                    } catch (e) {
                        currentGames = eval(arrayMatch[1]);
                    }
                }
                if (!isTest) renderAdminGames();
                return true;
            } catch (error) {
                console.error('Error fetching games:', error);
                return false;
            } finally {
                if (!isTest) loadingOverlay.classList.add('hidden');
            }
        }

        function renderAdminGames() {
            gameList.innerHTML = '';
            countSpan.textContent = currentGames.length;
            
            [...currentGames].reverse().forEach((game, index) => {
                const realIndex = currentGames.length - 1 - index;
                const item = document.createElement('div');
                item.className = 'admin-game-item';
                item.innerHTML = `
                    <div class="game-meta">
                        <img src="${game.image}" alt="" onerror="this.src='https://via.placeholder.com/50'">
                        <div><strong>${game.name}</strong><br><small>${game.category}</small></div>
                    </div>
                    <button class="remove-btn" onclick="removeGame(${realIndex})">REMOVE PERMANENTLY</button>
                `;
                gameList.appendChild(item);
            });
        }

        // Add Game (Enhanced with Upload)
        document.getElementById('add-game-btn').addEventListener('click', async () => {
            const name = document.getElementById('game-name').value.trim();
            const category = document.getElementById('game-category').value;
            const imageFile = document.getElementById('game-image-file').files[0];
            const folderFiles = document.getElementById('game-folder-files').files;

            if (!name || !imageFile || folderFiles.length === 0) {
                alert('Please fill Name, select Image and Game Folder!');
                return;
            }

            // HTML5 Validation: Check if index.html exists in the folder
            let hasIndexHtml = false;
            for (const file of folderFiles) {
                if (file.name.toLowerCase() === 'index.html') {
                    hasIndexHtml = true;
                    break;
                }
            }

            if (!hasIndexHtml) {
                alert('Invalid Game! Only HTML5 games are allowed. Selected folder must contain an "index.html" file.');
                return;
            }

            const cleanName = name.toLowerCase().replace(/[^a-z0-9]/g, '-');
            statusDiv.classList.remove('hidden');
            statusDiv.innerHTML = 'Starting upload...';
            
            try {
                // 1. Upload Image
                statusDiv.innerHTML = 'Uploading image...';
                const imageExt = imageFile.name.split('.').pop();
                const imagePath = `games/images/${cleanName}.${imageExt}`;
                const imageB64 = await fileToBase64(imageFile);
                await uploadFileToGitHub(imagePath, imageB64, `Upload image for ${name}`);

                // 2. Upload Folder Files
                statusDiv.innerHTML = `Uploading folder (${folderFiles.length} files)...`;
                let uploadedCount = 0;
                for (const file of folderFiles) {
                    // Get relative path: file.webkitRelativePath (e.g. "mygame/index.html")
                    // We want to store it in: games/[cleanName]/index.html
                    const relativePath = file.webkitRelativePath.split('/').slice(1).join('/');
                    if (!relativePath) continue; // Skip if it's the folder itself
                    
                    const filePath = `games/${cleanName}/${relativePath}`;
                    const fileB64 = await fileToBase64(file);
                    await uploadFileToGitHub(filePath, fileB64, `Upload game file for ${name}`);
                    
                    uploadedCount++;
                    statusDiv.innerHTML = `Uploading folder: ${uploadedCount}/${folderFiles.length} files...`;
                }

                // 3. Update games.js
                statusDiv.innerHTML = 'Updating games list...';
                const newGame = {
                    name: name,
                    category: category,
                    image: `https://raw.githubusercontent.com/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/main/${imagePath}`,
                    url: `https://${GITHUB_CONFIG.username}.github.io/${GITHUB_CONFIG.repo}/games/${cleanName}/index.html`
                };

                currentGames.push(newGame);
                await updateGitHubFile('Game added: ' + name);
                
                statusDiv.innerHTML = 'Success! Everything uploaded.';
                setTimeout(() => statusDiv.classList.add('hidden'), 3000);
            } catch (error) {
                console.error(error);
                statusDiv.innerHTML = 'Upload failed! Check console.';
                alert('Upload failed. Possible issues: Filename already exists or connection error.');
            }
        });

        // Remove Game
        window.removeGame = async (index) => {
            if (confirm('Are you sure you want to delete this game forever? (Note: Files on GitHub will stay, only the entry in games.js is removed)')) {
                const removedName = currentGames[index].name;
                currentGames.splice(index, 1);
                await updateGitHubFile('Game removed: ' + removedName);
            }
        };

        // Push Update to GitHub
        async function updateGitHubFile(message) {
            loadingOverlay.classList.remove('hidden');
            try {
                const newContent = `const games = ${JSON.stringify(currentGames, null, 4)};\n\nexport default games;`;
                const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_CONFIG.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        content: btoa(unescape(encodeURIComponent(newContent))),
                        sha: fileSha
                    })
                });

                if (response.ok) {
                    const result = await response.json();
                    fileSha = result.content.sha;
                    renderAdminGames();
                    // Clear inputs
                    document.getElementById('game-name').value = '';
                    document.getElementById('game-image-file').value = '';
                    document.getElementById('game-folder-files').value = '';
                } else {
                    throw new Error('Update failed');
                }
            } catch (error) {
                console.error(error);
                throw error;
            } finally {
                loadingOverlay.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
