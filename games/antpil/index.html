<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ant-pil (The Marble Quest)</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- Main Menu Screen -->
        <div id="menu-screen" class="overlay">
            <div class="menu-content wooden-panel">
                <h1 class="game-title">Ant-pil</h1>
                <div class="menu-buttons">
                    <button id="play-btn" class="wooden-btn">PLAY</button>
                    <button id="levels-btn" class="wooden-btn">LEVELS</button>
                    <button id="settings-btn" class="wooden-btn">SETTINGS</button>
                </div>
            </div>
        </div>

        <!-- Level Select Screen -->
        <div id="level-screen" class="overlay hidden">
            <div class="menu-content wooden-panel">
                <h2 id="level-page-title">CHOOSE LEVEL</h2>
                <div id="level-grid" class="level-grid">
                    <!-- Levels will be generated by JS -->
                </div>
                <div class="pagination">
                    <button id="prev-page-btn" class="wooden-btn small">PREV</button>
                    <span id="page-number">1 / 2</span>
                    <button id="next-page-btn" class="wooden-btn small">NEXT</button>
                </div>
                <button id="back-to-menu-levels" class="wooden-btn small">BACK</button>
            </div>
        </div>

        <!-- Settings Screen -->
        <div id="settings-screen" class="overlay hidden">
            <div class="menu-content wooden-panel">
                <h2>SETTINGS</h2>
                <div class="setting-item">
                    <span>SOUND EFFECTS</span>
                    <label class="switch">
                        <input type="checkbox" id="sound-toggle" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
                <button id="back-to-menu-settings" class="wooden-btn small">BACK</button>
            </div>
        </div>

        <!-- HUD (In-game UI) -->
        <div id="hud" class="hidden">
            <div id="stats-hud">
                <div class="stat-icon-box" title="Score">
                    <span class="icon">🏆</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="stat-icon-box" title="Chances">
                    <span class="icon">🎯</span>
                    <span id="chances" class="value">3</span>
                </div>
                <div class="stat-icon-box" title="Level">
                    <span class="icon">⭐</span>
                    <span id="current-level-display" class="value">1</span>
                </div>
            </div>
            <div id="stage-display-compact">
                <span id="stage-text">1</span>
            </div>
            <div id="hud-controls">
                <button id="pause-btn" class="wooden-btn-circle">||</button>
            </div>
        </div>

        <!-- Winning Screen -->
        <div id="win-screen" class="overlay hidden">
            <div class="menu-content wooden-panel">
                <h2 class="win-title">YOU WIN!</h2>
                <div class="win-stats">
                    <p>SCORE: <span id="win-score">0</span></p>
                </div>
                <div class="menu-buttons">
                    <button id="next-level-btn" class="wooden-btn">NEXT LEVEL</button>
                    <button id="win-menu-btn" class="wooden-btn">MENU</button>
                </div>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over" class="overlay hidden">
            <div class="menu-content wooden-panel">
                <h2 id="game-over-title">GAME OVER!</h2>
                <div class="final-stats">
                    <p>FINAL SCORE: <span id="final-score">0</span></p>
                </div>
                <div class="menu-buttons">
                    <button id="retry-btn" class="wooden-btn">RETRY</button>
                    <button id="main-menu-btn" class="wooden-btn">MENU</button>
                </div>
            </div>
        </div>

        <!-- Pause Screen -->
        <div id="pause-screen" class="overlay hidden">
            <div class="menu-content wooden-panel">
                <h2>PAUSED</h2>
                <div class="menu-buttons">
                    <button id="resume-btn" class="wooden-btn">RESUME</button>
                    <button id="pause-menu-btn" class="wooden-btn">MENU</button>
                </div>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
